name: Deploy Admin Portal (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "admin-portal/**"
      - ".github/workflows/deploy-admin-portal-cloudflare.yml"
  workflow_dispatch:

concurrency:
  group: deploy-admin-portal-cloudflare
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: CLOUDFLARE
    defaults:
      run:
        working-directory: admin-portal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build admin portal
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name admin-portal
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
